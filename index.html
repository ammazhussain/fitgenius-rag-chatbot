<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitGenius - AI Fitness Chatbot</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.11.1/tsparticles.bundle.min.js"></script>
  <style>
    body {
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      font-family: 'Open Sans', sans-serif;
      padding-top: 60px;
    }
    #chatbox {
    height: 240px;
    overflow-y: auto;
    background: linear-gradient(
    to bottom,
    rgba(128, 128, 128, 0.1),
    rgba(128, 128, 128, 0.2),
    rgba(128, 128, 128, 0.1)
    );

    border-radius: 10px;
    padding: 20px;

    /* Smooth keyboard scrolling */
    scroll-behavior: smooth;

    /* Firefox */
    scrollbar-width: thin;
    scrollbar-color: transparent transparent;
    }

    /* WebKit-based browsers */
    #chatbox::-webkit-scrollbar {
    width: 6px;
    }

    #chatbox::-webkit-scrollbar-track {
    background: transparent;
    }

    #chatbox::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1); /* very faint */
    border-radius: 10px;
    }

    #chatbox::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2); /* slightly more visible on hover */
    }
    .user, .bot {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 10px;
    }
    .user {
      background-color: transparent;
      text-align: right;
    }
    .bot {
      background-color: transparent;
      text-align: left;
    }
    #hero-text {
    font-size: 80px; /* increase text size */
    font-family: 'Allura', cursive;
    line-height: 1.25;        /* controls vertical spacing between lines */
    /*word-spacing: 8px;        increase space between words */
    letter-spacing: 2px;     /* optional: spacing between letters */
    }
    .lead {
    font-family: 'Allura', cursive;
    line-height: 1.1;
    font-size: normal;

    }
    .send-arrow-btn {
        background-color: rgba(40, 167, 69, 0.2); /* Transparent green */
        border: none;
        color: white;
        transition: background-color 0.3s ease;
    }

    .send-arrow-btn:hover {
        background-color: rgba(40, 167, 69, 0.4);
        color: white;
    }

    .send-arrow-btn i {
        font-size: 18px;
    }
    #particles-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    top: 0;
    left: 0;
    background: transparent;
    }

</style>
</head>
<body>
    <div id="particles-bg"></div>
  <div class="container">
    <div class="text-center mb-5">
      <h1 id="hero-text" class="display-4 fw-bold">Welcome to FitGenius</h1>
      <p class="lead">Unload your dreams into fitness by asking our AI-powered chatbot</p>
    </div>
    <div id="chatbox" class="mb-4"></div>
    <div class="input-group">
    <input type="text" id="userInput" class="form-control" placeholder="Ask something like: suggest a workout for back">
    <button class="btn send-arrow-btn" onclick="sendMessage()">
        <i class="fas fa-paper-plane"></i>
    </button>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
  tsParticles.load("particles-bg", {
    fullScreen: { enable: false },
    background: {
      color: { value: "transparent" }
    },
    particles: {
      number: {
        value: 25,
        density: {
          enable: true,
          value_area: 800
        }
      },color: {
        value: ["#fcff5e", "#5fd2ff", "#ffa150"]
        },
      shape: {
        type: "circle"
      },
      opacity: {
        value: 0.6,
        random: true
      },
      size: {
        value: 4,
        random: true
      },
      move: {
        enable: true,
        speed: 1,
        direction: "none",
        outMode: "out"
      }
    },
    interactivity: {
      events: {
        onHover: {
          enable: false
        },
        onClick: {
          enable: false
        }
      }
    }
  });
</script>
<script>
  gsap.from("#hero-text", {
    duration: 1.3,
    y: -30,
    opacity: 0,
  });

  const chatbox = document.getElementById("chatbox");
  const input = document.getElementById("userInput");
  const exitPhrases = ["exit", "goodbye", "shut up", "i don't want to exercise now"];

  function addMessage(message, sender) {
    const div = document.createElement("div");
    div.className = sender;
    div.innerText = message;
    chatbox.appendChild(div);
    chatbox.scrollTop = chatbox.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim().toLowerCase();
    if (!text) return;
    addMessage(text, "user");
    input.value = "";

    if (exitPhrases.some(phrase => text.includes(phrase))) {
      addMessage("🧘‍♂️ Alright, take care and stay healthy! See you next time.", "bot");
      input.disabled = true;
      return;
    }

    try {
      const response = await fetch("http://127.0.0.1:5000/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: text })
      });

      const data = await response.json();
      addMessage(data.answer, "bot");
    } catch (error) {
      addMessage("⚠️ Sorry, something went wrong. Please try again.", "bot");
    }
  }
</script>
</body>
</html>
